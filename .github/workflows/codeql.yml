# CodeQL static security analysis for JavaScript and TypeScript.
# Runs on every pull request, push to main, and weekly (Tuesday 03:23 UTC).

name: CodeQL
run-name: "CodeQL — ${{ github.event_name == 'schedule' && 'weekly scan' || github.event_name == 'push' && github.ref_name || github.head_ref || 'manual' }}"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 3 * * 2'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install
        working-directory: src
        run: npm ci

      - name: Build
        working-directory: src
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
