#:schema ../node_modules/wrangler/config-schema.json
name = "extensionchecker-frontend"
main = "worker.ts"
compatibility_date = "2026-03-11"
routes = [{ pattern = "app.extensionchecker.org", custom_domain = true }]

[observability]
enabled = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/health"]

# Service binding — connects to the backend Worker internally,
# no public network hop.  The binding name BACKEND must match
# the variable used in worker.ts.
[[services]]
binding = "BACKEND"
service = "extensionchecker-backend"

[vars]
# Fallback backend origin when no BACKEND service binding is configured
# (local dev with `wrangler dev`).  Not needed in production.
# API_BACKEND_BASE_URL = "http://127.0.0.1:8787"

# Shared secret injected as x-extensionchecker-token on every proxied
# /api/* request.  The browser never sees it.  Set as an ENCRYPTED
# SECRET in the Cloudflare dashboard, never in plaintext here.
# → wrangler secret put API_ACCESS_TOKEN
